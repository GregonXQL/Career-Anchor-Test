spring:
  application:
    name: career-anchor-server
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/career_anchor?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:career_anchor}
    password: ${DB_PASSWORD:career_anchor_dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    # Production must override with JWT_SECRET (at least 32 random bytes).
    secret: ${JWT_SECRET:dev-only-change-this-secret-at-least-32-bytes}
    user-ttl: 7d
    admin-ttl: 2h
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    mock-enabled: false
  assessment:
    scale-max: 6
    scale-labels:
      - 完全不符合
      - 偶尔这么想
      - 有时这么想
      - 经常这么想
      - 频繁这么想
      - 完全符合
    boost-count: 3
    boost-value: 4

springdoc:
  swagger-ui:
    path: /swagger-ui.html
